{% extends "base.html" %}
{% block title %}Captures - RFObserver{% endblock %}
{% block content %}
<script src="/static/shared-charts.js"></script>
<div class="page-header">
    <h1>IQ Captures</h1>
</div>

<div class="captures-layout">
    <div class="captures-list" id="captures-list">
        <div class="placeholder-text">Loading...</div>
    </div>
    <div class="captures-detail" id="captures-detail">
        <div class="placeholder-text">Select a capture to view details</div>
    </div>
</div>

<div id="captures-viewer-container" class="card" style="margin-top: 16px; display: none;">
    <div class="card-body" id="captures-viewer">
    </div>
</div>

<script>
(function() {
    const listEl = document.getElementById("captures-list");
    const detailEl = document.getElementById("captures-detail");
    const viewerContainer = document.getElementById("captures-viewer-container");
    const viewerEl = document.getElementById("captures-viewer");

    function formatBytes(b) {
        if (b < 1024) return b + " B";
        if (b < 1048576) return (b / 1024).toFixed(1) + " KB";
        if (b < 1073741824) return (b / 1048576).toFixed(1) + " MB";
        return (b / 1073741824).toFixed(2) + " GB";
    }

    function formatDuration(sec) {
        if (sec < 1) return (sec * 1000).toFixed(0) + " ms";
        if (sec < 60) return sec.toFixed(1) + " s";
        return (sec / 60).toFixed(1) + " min";
    }

    function formatFreq(hz) {
        if (hz >= 1e9) return (hz / 1e9).toFixed(3) + " GHz";
        if (hz >= 1e6) return (hz / 1e6).toFixed(1) + " MHz";
        if (hz >= 1e3) return (hz / 1e3).toFixed(1) + " kHz";
        return hz + " Hz";
    }

    async function loadList() {
        try {
            const r = await fetch("/captures/list");
            if (!r.ok) return;
            const captures = await r.json();

            if (captures.length === 0) {
                listEl.innerHTML = '<div class="placeholder-text">No captures yet</div>';
                return;
            }

            let html = "";
            for (const c of captures) {
                const m = c.meta || {};
                const freq = m.center_freq_hz ? formatFreq(m.center_freq_hz) : "";
                const dur = m.duration_sec ? formatDuration(m.duration_sec) : "";
                const dropped = m.dropped_chunks || 0;
                const time = m.start_time ? new Date(m.start_time).toLocaleString() : "";
                const psdBadge = c.has_psd ? '<span class="psd-badge">PSD</span>' : '';

                html += '<div class="capture-item" data-file="' + c.filename + '"'
                    + ' data-has-psd="' + (c.has_psd ? '1' : '0') + '">';
                html += '<div class="capture-name">' + c.filename + ' ' + psdBadge + '</div>';
                html += '<div class="capture-info">';
                html += formatBytes(c.size_bytes);
                if (dur) html += ' &middot; ' + dur;
                if (freq) html += ' &middot; ' + freq;
                if (dropped > 0) html += ' &middot; <span style="color:#ff3b30;">' + dropped + ' dropped</span>';
                html += '</div>';
                if (time) html += '<div class="capture-time">' + time + '</div>';
                html += '</div>';
            }
            listEl.innerHTML = html;

        } catch (_) {
            listEl.innerHTML = '<div class="placeholder-text">Failed to load</div>';
        }
    }

    // --- Viewer state ---
    // The waterfall is virtualized: rows are fetched in pages on demand as the
    // user scrolls, cached (with a bounded LRU so very long captures don't
    // exhaust memory), and only the visible window is ever drawn. The slider is
    // scoped to whatever rows are currently on screen.
    let viewerFreqs = null;    // freq axis
    let viewerTimeRes = 0;     // seconds per row
    let viewerTotalRows = 0;
    let viewerMin = -120;
    let viewerMax = -40;
    let viewerCrosshairBin = -1;
    let viewerFilename = null;
    // Display calibration baked into the capture: shifts stored dBFS/Hz to the
    // dBm/Hz the live view showed when recording. 0 / "dBFS" when uncalibrated.
    let viewerOffset = 0;
    let viewerUnit = "dBFS";

    const VIEW_ROWS = 400;     // waterfall viewport height in rows (1px/row)
    const PAGE = 500;          // rows fetched per request
    const MAX_PAGES = 48;      // LRU cap (~24k rows cached)
    let pageCache = new Map(); // pageIdx -> rows[][] (Map order = LRU)
    let pageLoading = new Set();

    async function showDetail(filename, hasPsd) {
        document.querySelectorAll(".capture-item").forEach(function(el) {
            el.classList.toggle("selected", el.dataset.file === filename);
        });

        try {
            const r = await fetch("/captures/detail/" + encodeURIComponent(filename));
            if (!r.ok) return;
            const d = await r.json();

            const m = d.meta || {};
            let html = '<div class="detail-header">' + d.filename + '</div>';
            html += '<table class="detail-table">';
            html += row("Size", formatBytes(d.size_bytes));
            if (m.format) html += row("Format", m.format.toUpperCase());
            if (m.sample_rate_hz) html += row("Sample Rate", formatFreq(m.sample_rate_hz));
            if (m.center_freq_hz) html += row("Center Freq", formatFreq(m.center_freq_hz));
            if (m.bandwidth_hz) html += row("Bandwidth", formatFreq(m.bandwidth_hz));
            if (m.gain_db != null) html += row("Gain", m.gain_db + " dB");
            if (m.duration_sec != null) html += row("Duration", formatDuration(m.duration_sec));
            if (m.total_samples != null) html += row("Samples", m.total_samples.toLocaleString());
            if (m.start_time) html += row("Start Time", new Date(m.start_time).toLocaleString());
            html += row("Trigger", m.trigger_initiated ? "Power threshold" : "Manual");
            html += row("Mode", m.ram_buffered ? "RAM buffered" : "Disk streaming");
            if (m.pre_trigger_sec != null) html += row("Pre-trigger", m.pre_trigger_sec + " s");
            if (m.dropped_chunks != null) {
                const cls = m.dropped_chunks > 0 ? ' style="color:#ff3b30;font-weight:600;"' : '';
                html += '<tr><td class="detail-label">Dropped Chunks</td>'
                    + '<td class="detail-value"' + cls + '>' + m.dropped_chunks + '</td></tr>';
            }
            if (m.hostname) html += row("Hostname", m.hostname);
            if (m.serial) html += row("Serial", m.serial);
            html += '</table>';

            detailEl.innerHTML = html;

            // Show viewer below in full-width container
            if (hasPsd) {
                viewerContainer.style.display = "";
                viewerEl.innerHTML = '<div class="viewer-label">Loading PSD data...</div>';
                loadPsdViewer(filename);
            } else {
                viewerContainer.style.display = "none";
                viewerEl.innerHTML = "";
            }

        } catch (_) {
            detailEl.innerHTML = '<div class="placeholder-text">Failed to load details</div>';
        }
    }

    // Shift a page's stored dBFS/Hz values to the calibrated dBm/Hz the live
    // view used. Applied once per page on load; no-op when uncalibrated.
    function shiftRows(rows) {
        if (!viewerOffset) return;
        for (let i = 0; i < rows.length; i++) {
            const r = rows[i];
            for (let j = 0; j < r.length; j++) r[j] += viewerOffset;
        }
    }

    async function fetchPageRaw(start) {
        try {
            const r = await fetch("/captures/psd/" + encodeURIComponent(viewerFilename)
                + "?start=" + start + "&count=" + PAGE + "&max_bins=512");
            if (!r.ok) return null;
            return await r.json();
        } catch (_) {
            return null;
        }
    }

    async function loadPsdViewer(filename) {
        viewerFilename = filename;
        pageCache = new Map();
        pageLoading = new Set();
        viewerCrosshairBin = -1;

        try {
            // The first page doubles as the metadata probe (total rows, time
            // resolution, freq axis, global colour range).
            const first = await fetchPageRaw(0);
            if (!first) { viewerEl.innerHTML = '<div class="placeholder-text">PSD data unavailable</div>'; return; }

            viewerFreqs = first.freq_axis;
            viewerTimeRes = first.time_resolution_s;
            viewerTotalRows = first.total_rows;
            const calSet = typeof first.cal_offset_db === "number";
            viewerOffset = calSet ? first.cal_offset_db : 0;
            viewerUnit = calSet ? "dBm/Hz" : "dBFS";
            viewerMin = (first.grid_min + viewerOffset) - 3;
            viewerMax = (first.grid_max + viewerOffset) + 3;
            shiftRows(first.grid);
            pageCache.set(0, first.grid);

            const totalRows = viewerTotalRows;
            const viewH = Math.max(1, Math.min(VIEW_ROWS, totalRows));  // viewport rows (1px each)
            const totalDuration = (totalRows * viewerTimeRes).toFixed(3);

            let html = '';
            html += '<div class="viewer-label" id="viewer-wf-label"></div>';
            html += '<div class="viewer-wf-scroll" id="viewer-wf-scroll" style="height:' + viewH + 'px;">';
            html += '<div class="viewer-wf-spacer" style="height:' + totalRows + 'px;">';
            html += '<canvas id="viewer-wf" class="viewer-wf-canvas" width="920" height="' + viewH
                + '" style="height:' + viewH + 'px;"></canvas>';
            html += '</div></div>';
            html += '<div class="viewer-slider-row">';
            html += '<input type="range" id="viewer-slider" min="0" max="' + (viewH - 1)
                + '" value="0" class="viewer-slider">';
            html += '<span id="viewer-time" class="viewer-time">0.000s</span>';
            html += '</div>';
            html += '<div class="viewer-label">PSD at selected time</div>';
            html += '<div style="position:relative;">';
            html += '<canvas id="viewer-psd" width="920" height="160" class="viewer-canvas"></canvas>';
            html += '<div id="viewer-psd-tooltip" class="graph-tooltip" style="display:none;"></div>';
            html += '</div>';
            html += '<div class="spectrogram-legend">';
            html += '<span class="legend-label">' + viewerMin.toFixed(0) + '</span>';
            html += '<canvas id="viewer-legend" width="200" height="12" style="width:200px;height:12px;border-radius:3px;"></canvas>';
            html += '<span class="legend-label">' + viewerMax.toFixed(0) + '</span>';
            html += '<span class="legend-label" style="margin-left:2px;">' + viewerUnit + '</span>';
            html += '</div>';
            viewerEl.innerHTML = html;

            const scrollEl = document.getElementById("viewer-wf-scroll");
            const wfLabel = document.getElementById("viewer-wf-label");
            const wfCanvas = document.getElementById("viewer-wf");
            const wfCtx = wfCanvas.getContext("2d");
            const psdCanvas = document.getElementById("viewer-psd");
            const psdCtx = psdCanvas.getContext("2d");
            const psdTooltip = document.getElementById("viewer-psd-tooltip");
            const slider = document.getElementById("viewer-slider");
            const timeLabel = document.getElementById("viewer-time");

            // Legend bar
            const legCanvas = document.getElementById("viewer-legend");
            const legCtx = legCanvas.getContext("2d");
            for (let x = 0; x < 200; x++) {
                const [cr, cg, cb] = powerToColor(x, 0, 199);
                legCtx.fillStyle = "rgb(" + cr + "," + cg + "," + cb + ")";
                legCtx.fillRect(x, 0, 1, 12);
            }

            let firstVisibleRow = 0;

            const pageIndexFor = function(absRow) { return Math.floor(absRow / PAGE); };

            function getRow(absRow) {
                const idx = pageIndexFor(absRow);
                const p = pageCache.get(idx);
                return p ? (p[absRow - idx * PAGE] || null) : null;
            }

            // Bound the cache: drop the oldest-loaded pages that aren't part of
            // the current visible window. Scrolling back re-fetches them.
            function evict(neededSet) {
                while (pageCache.size > MAX_PAGES) {
                    let removed = false;
                    for (const key of pageCache.keys()) {
                        if (!neededSet.has(key)) { pageCache.delete(key); removed = true; break; }
                    }
                    if (!removed) break;
                }
            }

            async function ensureVisible(firstRow) {
                const lastRow = Math.min(totalRows - 1, firstRow + viewH - 1);
                const firstPage = pageIndexFor(firstRow);
                const lastPage = pageIndexFor(lastRow);
                const needed = new Set();
                const toFetch = [];
                for (let p = firstPage; p <= lastPage; p++) {
                    needed.add(p);
                    if (!pageCache.has(p) && !pageLoading.has(p)) toFetch.push(p);
                }
                if (toFetch.length === 0) return false;
                await Promise.all(toFetch.map(async function(p) {
                    pageLoading.add(p);
                    const resp = await fetchPageRaw(p * PAGE);
                    pageLoading.delete(p);
                    if (resp) { shiftRows(resp.grid); pageCache.set(p, resp.grid); }
                }));
                evict(needed);
                return true;
            }

            function drawHighlight() {
                const y = parseInt(slider.value) - firstVisibleRow;
                if (y >= 0 && y < viewH) {
                    wfCtx.strokeStyle = "rgba(255,255,255,0.6)";
                    wfCtx.lineWidth = 1;
                    wfCtx.beginPath();
                    wfCtx.moveTo(0, y + 0.5);
                    wfCtx.lineTo(920, y + 0.5);
                    wfCtx.stroke();
                }
            }

            function renderWaterfall() {
                const img = wfCtx.createImageData(920, viewH);
                for (let y = 0; y < viewH; y++) {
                    const absRow = firstVisibleRow + y;
                    const rowData = (absRow < totalRows) ? getRow(absRow) : null;
                    if (rowData) {
                        renderWaterfallRow(img, 920, y, rowData, viewerMin, viewerMax);
                    } else {
                        // Not-yet-loaded rows render as a dark placeholder.
                        const base = y * 920 * 4;
                        for (let x = 0; x < 920; x++) {
                            const i = base + x * 4;
                            img.data[i] = 18; img.data[i + 1] = 18; img.data[i + 2] = 30; img.data[i + 3] = 255;
                        }
                    }
                }
                wfCtx.putImageData(img, 0, 0);
                drawHighlight();
            }

            function drawViewerPSD(absRow) {
                const powers = getRow(absRow);
                if (!powers) return;
                drawPSD(psdCtx, 920, 160, powers, viewerFreqs, viewerMin, viewerMax, viewerCrosshairBin, null, viewerUnit);
            }

            function updateLabel() {
                const lastRow = Math.min(totalRows, firstVisibleRow + viewH);
                wfLabel.textContent = 'Waterfall (rows ' + firstVisibleRow + '–' + (lastRow - 1)
                    + ' of ' + totalRows + ', ' + totalDuration + 's total)';
            }

            // Re-scope the slider to the visible window, keeping the selected
            // absolute row when it stays on screen, else clamping to an edge.
            function rescopeSlider() {
                const lastVisible = Math.min(totalRows - 1, firstVisibleRow + viewH - 1);
                let v = parseInt(slider.value);
                slider.min = firstVisibleRow;
                slider.max = lastVisible;
                if (v < firstVisibleRow) v = firstVisibleRow;
                if (v > lastVisible) v = lastVisible;
                slider.value = v;
                timeLabel.textContent = (v * viewerTimeRes).toFixed(3) + "s";
            }

            let rafPending = false;
            async function onScroll() {
                firstVisibleRow = Math.max(0, Math.min(
                    totalRows - viewH, Math.round(scrollEl.scrollTop)));
                rescopeSlider();
                updateLabel();
                renderWaterfall();              // paint what's already cached
                drawViewerPSD(parseInt(slider.value));
                if (await ensureVisible(firstVisibleRow)) {
                    renderWaterfall();          // repaint once fetched pages land
                    drawViewerPSD(parseInt(slider.value));
                }
            }

            scrollEl.addEventListener("scroll", function() {
                if (rafPending) return;
                rafPending = true;
                requestAnimationFrame(function() { rafPending = false; onScroll(); });
            });

            slider.addEventListener("input", function() {
                const idx = parseInt(this.value);
                timeLabel.textContent = (idx * viewerTimeRes).toFixed(3) + "s";
                renderWaterfall();
                drawViewerPSD(idx);
            });

            // Click a waterfall row → select it on the slider.
            wfCanvas.addEventListener("click", function(e) {
                const rect = wfCanvas.getBoundingClientRect();
                const scaleY = wfCanvas.height / rect.height;
                const absRow = firstVisibleRow + Math.floor((e.clientY - rect.top) * scaleY);
                if (absRow >= firstVisibleRow && absRow <= parseInt(slider.max)) {
                    slider.value = absRow;
                    slider.dispatchEvent(new Event("input"));
                }
            });

            // PSD crosshair
            psdCanvas.addEventListener("mousemove", function(e) {
                const rect = psdCanvas.getBoundingClientRect();
                const scaleX = psdCanvas.width / rect.width;
                const x = (e.clientX - rect.left) * scaleX;
                const N = viewerFreqs.length;
                viewerCrosshairBin = Math.min(N - 1, Math.max(0, Math.floor((x / 920) * N)));

                const freq = viewerFreqs[viewerCrosshairBin] || 0;
                const idx = parseInt(slider.value);
                const rowData = getRow(idx);
                const power = rowData ? (rowData[viewerCrosshairBin] || 0) : 0;

                psdTooltip.style.display = "block";
                psdTooltip.textContent = (freq / 1e6).toFixed(2) + " MHz  " + power.toFixed(1) + " " + viewerUnit;
                const tipX = e.clientX - rect.left;
                psdTooltip.style.left = Math.min(tipX + 10, rect.width - 160) + "px";
                psdTooltip.style.top = "4px";

                drawViewerPSD(idx);
            });

            psdCanvas.addEventListener("mouseleave", function() {
                viewerCrosshairBin = -1;
                psdTooltip.style.display = "none";
                drawViewerPSD(parseInt(slider.value));
            });

            // Initial paint
            rescopeSlider();
            updateLabel();
            renderWaterfall();
            drawViewerPSD(0);

        } catch (_) {
            viewerEl.innerHTML = '<div class="placeholder-text">Failed to load PSD data</div>';
        }
    }

    function row(label, value) {
        return '<tr><td class="detail-label">' + label + '</td><td class="detail-value">' + value + '</td></tr>';
    }

    listEl.addEventListener("click", function(e) {
        const item = e.target.closest(".capture-item");
        if (item) showDetail(item.dataset.file, item.dataset.hasPsd === "1");
    });

    loadList();

    // Re-list when capture_count ticks up on the /ws/live heartbeat — that's
    // the signal a recording finished and dropped a new file in storage.
    (function() {
        let lastCount = -1;
        let ws = null;
        function connect() {
            ws = new WebSocket("ws://" + location.host + "/ws/live");
            ws.onmessage = function(evt) {
                try {
                    const d = JSON.parse(evt.data);
                    if (d.type !== "heartbeat") return;
                    if (typeof d.capture_count === "number" && d.capture_count !== lastCount) {
                        if (lastCount >= 0) loadList();
                        lastCount = d.capture_count;
                    }
                } catch (_) {}
            };
            ws.onclose = function() { ws = null; setTimeout(connect, 2000); };
            ws.onerror = function() { try { ws.close(); } catch (_) {} };
        }
        connect();
    })();
})();
</script>
{% endblock %}
