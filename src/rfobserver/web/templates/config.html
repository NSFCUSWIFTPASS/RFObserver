{% extends "base.html" %}
{% block title %}Configuration - RFObserver{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Sensor Configuration</h1>
</div>

<form id="config-form" method="post">
<div class="card" style="margin-bottom: 16px;">
    <div class="card-header">Receiver</div>
    <div class="card-body">
        <div class="config-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="freq-start">Start Frequency (Hz)</label>
                    <input type="text" id="freq-start" name="frequency_start" class="sci-input" value="{{ settings.FREQUENCY_START }}" placeholder="e.g. 2.437e9">
                </div>
                <div class="form-group">
                    <label for="freq-end">End Frequency (Hz)</label>
                    <input type="text" id="freq-end" name="frequency_end" class="sci-input" value="{{ settings.FREQUENCY_END }}" placeholder="e.g. 2.437e9">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="bandwidth">Bandwidth (Hz)</label>
                    <input type="text" id="bandwidth" name="bandwidth" class="sci-input" value="{{ settings.BANDWIDTH }}" placeholder="e.g. 56e6">
                </div>
                <div class="form-group">
                    <label for="gain">Gain (dB)</label>
                    <input type="number" id="gain" name="gain" value="{{ settings.GAIN }}" min="0" max="76">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="duration">Duration (s)</label>
                    <input type="number" id="duration" name="duration_sec" value="{{ settings.DURATION_SEC }}" step="0.1" min="0.1" max="10">
                </div>
                <div class="form-group">
                    <label for="freq-step">Frequency Step (Hz)</label>
                    <input type="text" id="freq-step" name="frequency_step" class="sci-input" value="{{ settings.FREQUENCY_STEP }}" placeholder="e.g. 1e6">
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card" style="margin-bottom: 16px;">
    <div class="card-header">Burst Detection</div>
    <div class="card-body">
        <div class="config-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="threshold">Threshold High (dB)</label>
                    <input type="number" id="threshold" name="burst_threshold_high_db" value="{{ settings.BURST_THRESHOLD_HIGH_DB }}" step="0.5">
                </div>
                <div class="form-group">
                    <label for="threshold-low">Threshold Low Ratio</label>
                    <input type="number" id="threshold-low" name="burst_threshold_low_ratio" value="{{ settings.BURST_THRESHOLD_LOW_RATIO }}" step="0.05" min="0" max="1">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="time-res">PSD Time Resolution (ms)</label>
                    <input type="number" id="time-res" name="psd_time_resolution_ms" value="{{ settings.PSD_TIME_RESOLUTION_MS }}" step="0.1">
                </div>
                <div class="form-group">
                    <label for="fft-bins">FFT Bins</label>
                    <select id="fft-bins" name="num_fft_bins">
                        {% for n in [256, 512, 1024, 2048, 4096, 8192] %}
                        <option value="{{ n }}" {{ "selected" if settings.NUM_FFT_BINS == n else "" }}>{{ n }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card" style="margin-bottom: 16px;">
    <div class="card-header">Storage</div>
    <div class="card-body">
        <div class="config-form">
            <div class="form-row">
                <div class="form-group" style="flex: 2;">
                    <label for="storage-path">Storage Path</label>
                    <div style="display: flex; gap: 6px;">
                        <input type="text" id="storage-path" value="{{ settings.STORAGE_PATH }}" style="flex: 1;">
                        <button type="button" id="set-path-btn" class="btn-apply" style="padding: 4px 12px; font-size: 12px;">Set</button>
                    </div>
                    <span id="path-status" style="font-size: 10px; margin-top: 2px; display: block;"></span>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="archive-max">Archive Max (GB)</label>
                    <input type="number" id="archive-max" name="archive_max_gb" value="{{ settings.ARCHIVE_MAX_GB }}" step="1" min="1">
                </div>
                <div class="form-group">
                    <label for="history-days">History Days</label>
                    <input type="number" id="history-days" name="history_days" value="{{ settings.HISTORY_DAYS }}" min="1">
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card" style="margin-bottom: 16px;">
    <div class="card-header">
        NATS
        <span style="flex:1;"></span>
        <label class="toggle-label" title="Enable/disable NATS publishing">
            <input type="checkbox" id="nats-toggle" {% if settings.NATS_ENABLED %}checked{% endif %}>
            <span class="toggle-text">Enabled</span>
        </label>
        <span id="nats-status" style="font-size:10px;opacity:0.6;margin-left:8px;">--</span>
    </div>
    <div class="card-body">
        <div class="config-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="nats-host">Host</label>
                    <input type="text" id="nats-host" name="nats_host" value="{{ settings.NATS_HOST }}">
                </div>
                <div class="form-group">
                    <label for="nats-port">Port</label>
                    <input type="number" id="nats-port" name="nats_port" value="{{ settings.NATS_PORT }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group" style="flex:2;">
                    <label for="nats-token">Token</label>
                    <input type="password" id="nats-token" name="nats_token" value="" placeholder="(unchanged)">
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card" style="margin-bottom: 16px;">
    <div class="card-header">
        OpenZMS
        <span style="flex:1;"></span>
        <label class="toggle-label" title="Enable/disable ZMS submissions">
            <input type="checkbox" id="zms-toggle" {% if settings.zms and settings.ZMS_ENABLED %}checked{% endif %}>
            <span class="toggle-text">Enabled</span>
        </label>
        <span id="zms-status" style="font-size:10px;opacity:0.6;margin-left:8px;">--</span>
    </div>
    <div class="card-body">
        <div class="config-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="zms-zmc">ZMC URL</label>
                    <input type="text" id="zms-zmc" name="zms_zmc_http" value="{{ settings.ZMS_ZMC_HTTP or '' }}" placeholder="http://zmc.example.com">
                </div>
                <div class="form-group">
                    <label for="zms-dst">DST URL</label>
                    <input type="text" id="zms-dst" name="zms_dst_http" value="{{ settings.ZMS_DST_HTTP or '' }}" placeholder="http://dst.example.com">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="zms-identity">Identity URL</label>
                    <input type="text" id="zms-identity" name="zms_identity_http" value="{{ settings.ZMS_IDENTITY_HTTP or '' }}" placeholder="http://identity.example.com">
                </div>
                <div class="form-group">
                    <label for="zms-monitor-id">Monitor ID</label>
                    <input type="text" id="zms-monitor-id" name="zms_monitor_id" value="{{ settings.ZMS_MONITOR_ID or '' }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="zms-token">Token</label>
                    <input type="password" id="zms-token" name="zms_token" value="" placeholder="(unchanged)">
                </div>
                <div class="form-group">
                    <label for="zms-name">Monitor Name</label>
                    <input type="text" id="zms-name" name="zms_monitor_name" value="{{ settings.ZMS_MONITOR_NAME or '' }}" placeholder="RFObs - {{ settings.HOSTNAME }}">
                </div>
            </div>
        </div>
    </div>
</div>

<div class="form-actions">
    <button type="submit" id="apply-btn" class="btn-apply" disabled>
        <span id="btn-label">Apply</span>
        <span id="btn-spinner" class="spinner" style="display: none;"></span>
    </button>
</div>
</form>

<script>
(function() {
    const form = document.getElementById('config-form');
    const btn = document.getElementById('apply-btn');
    const label = document.getElementById('btn-label');
    const spinner = document.getElementById('btn-spinner');
    let initial = new FormData(form);
    let initialMap = {};
    for (const [k, v] of initial.entries()) initialMap[k] = v;

    function hasChanges() {
        const current = new FormData(form);
        for (const [k, v] of current.entries()) {
            if (initialMap[k] !== v) return true;
        }
        return false;
    }

    function setState(state) {
        if (state === 'dirty') {
            btn.disabled = false;
            btn.classList.remove('btn-applied');
            label.textContent = 'Apply';
            spinner.style.display = 'none';
        } else if (state === 'submitting') {
            btn.disabled = true;
            label.textContent = '';
            spinner.style.display = 'inline-block';
        } else if (state === 'applied') {
            btn.disabled = true;
            btn.classList.add('btn-applied');
            label.textContent = 'Applied';
            spinner.style.display = 'none';
        } else if (state === 'error') {
            btn.disabled = false;
            btn.classList.remove('btn-applied');
            label.textContent = 'Retry';
            spinner.style.display = 'none';
        } else {
            btn.disabled = true;
            btn.classList.remove('btn-applied');
            label.textContent = 'Apply';
            spinner.style.display = 'none';
        }
    }

    form.addEventListener('input', function() {
        if (hasChanges()) {
            setState('dirty');
        } else {
            setState('clean');
        }
    });

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        setState('submitting');

        const data = {};
        const fd = new FormData(form);
        for (const [k, v] of fd.entries()) {
            // Parse scientific notation (e.g. 2.437e9, 56e6) for sci-input fields
            const el = form.querySelector('[name="' + k + '"]');
            if (el && el.classList.contains('sci-input')) {
                const parsed = parseFloat(v);
                if (isNaN(parsed)) {
                    alert('Invalid value for ' + k + ': ' + v);
                    setState('error');
                    return;
                }
                data[k] = String(Math.round(parsed));
            } else {
                data[k] = v;
            }
        }

        try {
            const resp = await fetch('/config/apply', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data),
            });
            if (!resp.ok) {
                const err = await resp.json();
                alert(err.detail || 'Failed to apply configuration');
                setState('error');
                return;
            }
            // Update initial values to current
            const current = new FormData(form);
            initialMap = {};
            for (const [k, v] of current.entries()) initialMap[k] = v;
            setState('applied');
        } catch (err) {
            alert('Network error: ' + err.message);
            setState('error');
        }
    });
    // --- Storage path Set button ---
    const setPathBtn = document.getElementById('set-path-btn');
    const pathInput = document.getElementById('storage-path');
    const pathStatus = document.getElementById('path-status');

    setPathBtn.addEventListener('click', async function() {
        const path = pathInput.value.trim();
        if (!path) return;

        setPathBtn.disabled = true;
        setPathBtn.textContent = '...';
        pathStatus.textContent = '';
        pathStatus.style.color = '';

        try {
            const resp = await fetch('/api/storage/set-path', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({path: path}),
            });
            const data = await resp.json();
            if (resp.ok) {
                pathStatus.textContent = data.message || 'Path set';
                pathStatus.style.color = '#34c759';
                setPathBtn.textContent = 'Set';
            } else {
                pathStatus.textContent = data.detail || 'Failed';
                pathStatus.style.color = '#ff3b30';
                setPathBtn.textContent = 'Set';
            }
        } catch (err) {
            pathStatus.textContent = 'Network error';
            pathStatus.style.color = '#ff3b30';
            setPathBtn.textContent = 'Set';
        }
        setPathBtn.disabled = false;
    });

    // --- ZMS / NATS status: pushed over /ws/live as a 1 Hz heartbeat ---
    function renderZmsStatus(d) {
        const el = document.getElementById('zms-status');
        if (!el || !d) return;
        if (d.enabled) {
            el.textContent = d.last_sent || 'enabled';
            el.style.color = d.connected ? '#34c759' : '#ff9f0a';
        } else {
            el.textContent = 'disabled';
            el.style.color = '';
        }
    }
    function renderNatsStatus(d) {
        const el = document.getElementById('nats-status');
        if (!el || !d) return;
        if (d.enabled) {
            if (d.connected) {
                el.textContent = (d.stats_count || 0) + ' stats sent';
                el.style.color = '#34c759';
            } else {
                el.textContent = 'disconnected';
                el.style.color = '#ff9f0a';
            }
        } else {
            el.textContent = 'disabled';
            el.style.color = '';
        }
    }

    // Open a websocket purely to receive heartbeat state. Reconnect on close.
    let statusWs = null;
    function connectStatusWs() {
        statusWs = new WebSocket("ws://" + location.host + "/ws/live");
        statusWs.onmessage = function(evt) {
            try {
                const data = JSON.parse(evt.data);
                if (data.type !== "heartbeat") return;
                renderZmsStatus(data.zms);
                renderNatsStatus(data.nats);
            } catch (_) {}
        };
        statusWs.onclose = function() {
            statusWs = null;
            setTimeout(connectStatusWs, 2000);
        };
        statusWs.onerror = function() { try { statusWs.close(); } catch (_) {} };
    }
    connectStatusWs();

    // pollStatus() is used by the toggle handlers (below) to refresh the UI
    // immediately after a mutation — heartbeat would catch up in ~1 s, but
    // mutation-feedback should be instant.
    async function pollStatus() {
        try {
            const r = await fetch('/api/zms/status');
            if (r.ok) renderZmsStatus(await r.json());
        } catch (_) {}
        try {
            const r = await fetch('/api/nats/status');
            if (r.ok) renderNatsStatus(await r.json());
        } catch (_) {}
    }
    pollStatus();

    // --- ZMS toggle ---
    const zmsToggle = document.getElementById('zms-toggle');
    zmsToggle.addEventListener('change', async function() {
        const endpoint = this.checked ? '/api/zms/enable' : '/api/zms/disable';
        await fetch(endpoint, {method: 'POST'});
        pollStatus();
    });

    // --- NATS toggle ---
    const natsToggle = document.getElementById('nats-toggle');
    natsToggle.addEventListener('change', async function() {
        const endpoint = this.checked ? '/api/nats/enable' : '/api/nats/disable';
        const r = await fetch(endpoint, {method: 'POST'});
        if (!r.ok) {
            this.checked = !this.checked;
        } else {
            const d = await r.json();
            if (d.status === 'error') {
                alert(d.detail || 'NATS toggle failed');
                this.checked = !this.checked;
            }
        }
        pollStatus();
    });
})();
</script>
{% endblock %}
