{% extends "base.html" %}
{% block title %}Dashboard - RFObserver{% endblock %}
{% block content %}
<script src="/static/shared-charts.js"></script>
<div class="graph-stack">
    <div class="card">
        <div class="card-header">
            <span class="card-header-label" hx-get="/api/status-bar" hx-trigger="load, every 2s" hx-swap="innerHTML">Loading...</span>
            <span class="status-sep">&middot;</span>
            <span id="ups-counter" class="card-header-label" style="opacity: 0.5;">-- ups</span>
            <span id="timing-sep" class="status-sep" style="display: none;">&middot;</span>
            <span id="timing-info" class="card-header-label" style="opacity: 0.5;"></span>
            <span style="flex: 1;"></span>
            <label class="toggle-label" title="Per-chunk updates (off = duration-averaged)">
                <input type="checkbox" id="highres-toggle">
                <span class="toggle-text">High Res</span>
            </label>
            <label class="toggle-label" title="Show detected bursts on waterfall" id="burst-toggle-label" style="display:none;">
                <input type="checkbox" id="burst-toggle" checked>
                <span style="display:inline-block;width:15px;height:13px;border:1.5px solid #ff3b30;border-radius:2px;vertical-align:middle;"></span>
            </label>
            <span class="status-sep">&middot;</span>
            <span id="rec-controls">
                <button id="rec-btn" class="rec-btn rec-start" title="Start recording">REC</button>
                <button id="arm-btn" class="rec-btn rec-arm" title="Arm trigger">ARM</button>
                <button id="stop-btn" class="rec-btn rec-stop" style="display:none;" title="Stop">STOP</button>
                <span id="rec-status" class="rec-status-label"></span>
            </span>
        </div>
        <div class="graph-group">
            <div style="position: relative;">
                <canvas id="timeseries-canvas" width="920" height="160" style="width: 100%; height: 160px;"></canvas>
                <div class="graph-legend" id="ts-legend">
                    <span class="legend-item active" data-trace="power" style="--color: #0071e3;">Power</span>
                    <span class="legend-item" data-trace="kurtosis" style="--color: #ff9f0a;">Kurtosis</span>
                </div>
                <div id="ts-tooltip" class="graph-tooltip" style="display: none;"></div>
            </div>
            <div style="position: relative;">
                <canvas id="psd-canvas" width="920" height="160" style="width: 100%; height: 160px;"></canvas>
                <div id="psd-tooltip" class="graph-tooltip" style="display: none;"></div>
            </div>
            <div id="wf-wrapper" style="position: relative;">
                <canvas id="waterfall-canvas" width="920" height="260" style="width: 100%; height: 260px;"></canvas>
                <canvas id="burst-overlay" width="920" height="260" style="position: absolute; top: 0; left: 0; width: 100%; height: 260px; pointer-events: none;"></canvas>
                <div id="burst-tooltip" class="graph-tooltip" style="display: none;"></div>
            </div>
        </div>
        <div class="spectrogram-legend">
            <span class="legend-label" id="legend-min">--</span>
            <canvas id="legend-canvas" width="200" height="12" style="width: 200px; height: 12px; border-radius: 3px;"></canvas>
            <span class="legend-label" id="legend-max">--</span>
            <span class="legend-label" style="margin-left: 2px;">dBFS</span>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-header-label">Recent Detections</span>
        </div>
        <div class="card-body" style="padding: 0; max-height: 260px; overflow-y: auto;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Freq</th>
                        <th>BW</th>
                        <th>Duration</th>
                        <th>Peak</th>
                    </tr>
                </thead>
                <tbody hx-get="/api/detections" hx-trigger="load, every 5s" hx-swap="innerHTML">
                    <tr><td colspan="5" class="placeholder-text">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-header-label">Signal Modules</span>
            <span style="flex: 1;"></span>
            <button id="add-module-btn" class="rec-btn rec-arm" style="font-size: 11px;">+ Add</button>
        </div>
        <div class="card-body" id="modules-container" style="padding: 8px;">
            <div class="placeholder-text" id="modules-empty">No modules active</div>
        </div>
    </div>
</div>

<script>
(function() {
    const WS_URL = "ws://" + location.host + "/ws/live";
    const TS_MAX_POINTS = 120;

    // High-res mode state
    let highRes = false;
    let showBursts = true;
    let ws = null;

    const burstToggle = document.getElementById("burst-toggle");
    const burstToggleLabel = document.getElementById("burst-toggle-label");
    burstToggle.addEventListener("change", function() {
        showBursts = this.checked;
        if (!showBursts) {
            burstCtx.clearRect(0, 0, wfWidth, wfHeight);
        }
    });

    const toggle = document.getElementById("highres-toggle");
    toggle.addEventListener("change", function() {
        highRes = this.checked;
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({type: "set_mode", high_res: highRes}));
        }
        // Burst rectangles only make sense in high-res mode (averaged-mode
        // rows span DURATION_SEC, far longer than any burst).
        if (highRes) {
            burstToggleLabel.style.display = "";
        } else {
            burstToggleLabel.style.display = "none";
            showBursts = false;
            burstCtx.clearRect(0, 0, wfWidth, wfHeight);
        }
        // Clear waterfall — time scale changes between modes
        clearWaterfall();
    });

    // Trace visibility (clickable legend)
    const traceVisible = {power: true, kurtosis: false};

    document.querySelectorAll("#ts-legend .legend-item").forEach(function(el) {
        const trace = el.dataset.trace;
        if (traceVisible[trace]) el.classList.add("active");
        else el.classList.remove("active");

        el.addEventListener("click", function() {
            traceVisible[trace] = !traceVisible[trace];
            el.classList.toggle("active", traceVisible[trace]);
            drawTimeSeries();
        });
    });

    // Time-series buffers
    const tsAvgPower = [];
    const tsKurtosis = [];

    // powerToColor() and drawPSD() are in shared-charts.js

    // Dynamic range (must be declared before drawLegendBar)
    let dynamicMin = -120;
    let dynamicMax = -40;

    // Draw color legend
    const legendCanvas = document.getElementById("legend-canvas");
    const legendCtx = legendCanvas.getContext("2d");
    function drawLegendBar() {
        for (let x = 0; x < 200; x++) {
            const [r, g, b] = powerToColor(x, 0, 199);
            legendCtx.fillStyle = `rgb(${r},${g},${b})`;
            legendCtx.fillRect(x, 0, 1, 12);
        }
        document.getElementById("legend-min").textContent = dynamicMin.toFixed(0);
        document.getElementById("legend-max").textContent = dynamicMax.toFixed(0);
    }
    drawLegendBar();

    // --- Time-series chart with crosshair ---
    const tsCanvas = document.getElementById("timeseries-canvas");
    const tsCtx = tsCanvas.getContext("2d");
    const tsTooltip = document.getElementById("ts-tooltip");
    let tsCrosshairIdx = -1;

    // Time-series trigger-line state — populated lazily once we have a
    // power range (pMin/pMax) from the trace data.
    let tsPMin = null;
    let tsPMax = null;

    tsCanvas.addEventListener("mousedown", function(e) {
        if (tsPMin == null || tsPMax == null) return;
        const rect = tsCanvas.getBoundingClientRect();
        const scaleY = tsCanvas.height / rect.height;
        const my = (e.clientY - rect.top) * scaleY;
        const H = tsCanvas.height;
        // Line is drawn at (triggerThresholdDb - 17) on the trace's axis.
        const lineDb = triggerThresholdDb - IQ_STATS_OFFSET_DB;
        const ty = H - ((lineDb - tsPMin) / (tsPMax - tsPMin)) * H;
        if (Math.abs(my - ty) < 8) {
            draggingTrigger = true;
            e.preventDefault();
        }
    });

    tsCanvas.addEventListener("mouseup", function() {
        if (draggingTrigger) {
            draggingTrigger = false;
            const rounded = Math.round(triggerThresholdDb * 10) / 10;
            triggerThresholdDb = rounded;
            fetch("/config/apply", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({trigger_threshold_db: String(rounded)}),
            });
            tsCanvas.style.cursor = "";
        }
    });

    tsCanvas.addEventListener("mousemove", function(e) {
        const N = tsAvgPower.length;
        if (N < 2) return;
        const rect = tsCanvas.getBoundingClientRect();
        const scaleX = tsCanvas.width / rect.width;
        const scaleY = tsCanvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const my = (e.clientY - rect.top) * scaleY;
        const H = tsCanvas.height;

        if (draggingTrigger && tsPMin != null && tsPMax != null) {
            // Drag updates the trace-axis line position, then we add the
            // 17 dB offset back when saving to TRIGGER_THRESHOLD_DB.
            const lineDb = tsPMax - (my / H) * (tsPMax - tsPMin);
            triggerThresholdDb = lineDb + IQ_STATS_OFFSET_DB;
            tsCanvas.style.cursor = "ns-resize";
            drawTimeSeries();
            return;
        }

        if (tsPMin != null && tsPMax != null) {
            const lineDb = triggerThresholdDb - IQ_STATS_OFFSET_DB;
            const ty = H - ((lineDb - tsPMin) / (tsPMax - tsPMin)) * H;
            tsCanvas.style.cursor = Math.abs(my - ty) < 8 ? "ns-resize" : "";
        }

        tsCrosshairIdx = Math.min(N - 1, Math.max(0, Math.round((x / tsCanvas.width) * (TS_MAX_POINTS - 1))));
        if (tsCrosshairIdx >= N) tsCrosshairIdx = N - 1;

        let tip = "Avg " + tsAvgPower[tsCrosshairIdx].toFixed(1) + " dBFS";
        if (traceVisible.kurtosis) {
            tip += "  K " + tsKurtosis[tsCrosshairIdx].toFixed(2);
        }
        tsTooltip.textContent = tip;
        tsTooltip.style.display = "block";
        const tipX = e.clientX - rect.left;
        tsTooltip.style.left = Math.min(tipX + 10, rect.width - 150) + "px";
        tsTooltip.style.top = "4px";

        drawTimeSeries();
    });

    tsCanvas.addEventListener("mouseleave", function() {
        if (draggingTrigger) {
            draggingTrigger = false;
            tsCanvas.style.cursor = "";
        }
        tsCrosshairIdx = -1;
        tsTooltip.style.display = "none";
        drawTimeSeries();
    });

    function drawTimeSeries() {
        const W = tsCanvas.width;
        const H = tsCanvas.height;
        tsCtx.clearRect(0, 0, W, H);
        tsCtx.fillStyle = "#1a1a2e";
        tsCtx.fillRect(0, 0, W, H);

        const N = tsAvgPower.length;
        if (N < 2) return;

        // Grid
        tsCtx.strokeStyle = "rgba(255,255,255,0.06)";
        tsCtx.lineWidth = 1;
        for (let i = 1; i < 4; i++) {
            const y = (H / 4) * i;
            tsCtx.beginPath(); tsCtx.moveTo(0, y); tsCtx.lineTo(W, y); tsCtx.stroke();
        }

        // Power range (needed for crosshair even if trace hidden).
        // Also factor the trigger line's position into the range so it
        // always stays on-screen when the user drags it.
        let pMin = Infinity, pMax = -Infinity;
        for (let i = 0; i < N; i++) {
            if (tsAvgPower[i] < pMin) pMin = tsAvgPower[i];
            if (tsAvgPower[i] > pMax) pMax = tsAvgPower[i];
        }
        const triggerLineDb = triggerThresholdDb - IQ_STATS_OFFSET_DB;
        if (triggerLineDb < pMin) pMin = triggerLineDb;
        if (triggerLineDb > pMax) pMax = triggerLineDb;
        const pPad = Math.max((pMax - pMin) * 0.1, 2);
        pMin -= pPad; pMax += pPad;
        tsPMin = pMin;
        tsPMax = pMax;

        // Power trace
        if (traceVisible.power) {
            tsCtx.beginPath();
            for (let i = 0; i < N; i++) {
                const x = (i / (TS_MAX_POINTS - 1)) * W;
                const y = H - ((tsAvgPower[i] - pMin) / (pMax - pMin)) * H;
                if (i === 0) tsCtx.moveTo(x, y); else tsCtx.lineTo(x, y);
            }
            tsCtx.strokeStyle = "#0071e3";
            tsCtx.lineWidth = 1.5;
            tsCtx.stroke();

            tsCtx.font = "10px -apple-system, sans-serif";
            tsCtx.fillStyle = "#0071e3";
            tsCtx.textAlign = "left";
            tsCtx.fillText("Power " + tsAvgPower[N-1].toFixed(1) + " dBFS", 4, 12);

            tsCtx.fillStyle = "rgba(255,255,255,0.4)";
            tsCtx.textAlign = "right";
            tsCtx.fillText(pMax.toFixed(0) + " dBFS", W - 4, 12);
            tsCtx.fillText(pMin.toFixed(0) + " dBFS", W - 4, H - 4);
        }

        // IQ-recording trigger line (broadband). Drawn at trigger - 17 to
        // sit on the trace's axis (iq_stats has the 50-ohm offset applied).
        // Label shows the underlying TRIGGER_THRESHOLD_DB so the user sees
        // the value they're configuring.
        const triggerY = H - ((triggerLineDb - pMin) / (pMax - pMin)) * H;
        if (triggerY >= 0 && triggerY <= H) {
            tsCtx.strokeStyle = "rgba(255, 60, 60, 0.7)";
            tsCtx.lineWidth = 1;
            tsCtx.setLineDash([6, 4]);
            tsCtx.beginPath();
            tsCtx.moveTo(0, triggerY);
            tsCtx.lineTo(W, triggerY);
            tsCtx.stroke();
            tsCtx.setLineDash([]);
            tsCtx.fillStyle = "rgba(255, 60, 60, 0.9)";
            tsCtx.textAlign = "right";
            tsCtx.fillText(
                "Trigger " + triggerThresholdDb.toFixed(1) + " dBFS",
                W - 4, triggerY - 4,
            );
        }

        // Kurtosis trace
        if (traceVisible.kurtosis) {
            let kMin = Infinity, kMax = -Infinity;
            for (let i = 0; i < N; i++) {
                if (tsKurtosis[i] < kMin) kMin = tsKurtosis[i];
                if (tsKurtosis[i] > kMax) kMax = tsKurtosis[i];
            }
            const kPad = Math.max((kMax - kMin) * 0.1, 0.5);
            kMin -= kPad; kMax += kPad;

            tsCtx.beginPath();
            for (let i = 0; i < N; i++) {
                const x = (i / (TS_MAX_POINTS - 1)) * W;
                const y = H - ((tsKurtosis[i] - kMin) / (kMax - kMin)) * H;
                if (i === 0) tsCtx.moveTo(x, y); else tsCtx.lineTo(x, y);
            }
            tsCtx.strokeStyle = "#ff9f0a";
            tsCtx.lineWidth = 1.5;
            tsCtx.stroke();

            tsCtx.font = "10px -apple-system, sans-serif";
            tsCtx.fillStyle = "#ff9f0a";
            tsCtx.textAlign = "left";
            tsCtx.fillText("Kurtosis " + tsKurtosis[N-1].toFixed(2), 4, traceVisible.power ? 24 : 12);
        }

        // Crosshair
        if (tsCrosshairIdx >= 0 && tsCrosshairIdx < N) {
            const cx = (tsCrosshairIdx / (TS_MAX_POINTS - 1)) * W;
            tsCtx.strokeStyle = "rgba(255,255,255,0.4)";
            tsCtx.lineWidth = 1;
            tsCtx.setLineDash([4, 4]);
            tsCtx.beginPath(); tsCtx.moveTo(cx, 0); tsCtx.lineTo(cx, H); tsCtx.stroke();
            tsCtx.setLineDash([]);

            // Dot on power trace
            if (traceVisible.power) {
                const py = H - ((tsAvgPower[tsCrosshairIdx] - pMin) / (pMax - pMin)) * H;
                tsCtx.beginPath();
                tsCtx.arc(cx, py, 3, 0, Math.PI * 2);
                tsCtx.fillStyle = "#0071e3";
                tsCtx.fill();
            }
        }
    }

    // --- PSD line chart with persistent crosshair ---
    const psdCanvas = document.getElementById("psd-canvas");
    const psdCtx = psdCanvas.getContext("2d");
    const psdTooltip = document.getElementById("psd-tooltip");

    let lastPowers = [];
    let lastFrequencies = [];
    let psdCrosshairBin = -1;  // persists across redraws

    // --- Threshold lines on two distinct charts ---
    //
    // PSD chart  → burst-detection high threshold.
    //   Drawn at (noise_floor_db + burst_threshold_high_db). Per-bin PSD units.
    //   Drag → save burst_threshold_high_db as (line_y - noise_floor_db).
    //
    // Time-series → IQ-recording trigger threshold.
    //   Drawn at (trigger_threshold_db - 17). The -17 compensates for the
    //   50-ohm normalization in iq_utils.calculate_iq_statistics; the trigger
    //   itself is checked against broadband mean power without that offset
    //   (streaming.py:_check_power_above_threshold). We keep the offset in
    //   iq_stats so OpenZMS observation values stay on the historical scale.
    //   Drag → save trigger_threshold_db as (line_y + 17).
    const IQ_STATS_OFFSET_DB = 17.0;

    let burstThresholdHighDb = {{ settings.BURST_THRESHOLD_HIGH_DB }};
    let burstThresholdLowRatio = {{ settings.BURST_THRESHOLD_LOW_RATIO }};
    let noiseFloorDb = null;  // populated from each broadcast
    let burstAbsLevel = null;  // = noiseFloorDb + burstThresholdHighDb
    let burstLowAbsLevel = null;  // = noiseFloorDb + burstThresholdHighDb * ratio
    let draggingBurst = false;
    let draggingBurstLow = false;

    let triggerThresholdDb = {{ settings.TRIGGER_THRESHOLD_DB }};
    let draggingTrigger = false;

    // PSD chart: two draggable threshold lines.
    //   High line (red)  → BURST_THRESHOLD_HIGH_DB         — burst ignition
    //   Low line (orange)→ BURST_THRESHOLD_HIGH_DB * ratio — burst extent
    // Each line is "near" the cursor within 8 px to grab. The low line's drag
    // updates the *ratio* (line - floor) / high; clamped into (0, 1].
    psdCanvas.addEventListener("mousedown", function(e) {
        if (burstAbsLevel == null) return;
        const rect = psdCanvas.getBoundingClientRect();
        const scaleY = psdCanvas.height / rect.height;
        const my = (e.clientY - rect.top) * scaleY;
        const H = psdCanvas.height;
        const tyHi = H - ((burstAbsLevel - dynamicMin) / (dynamicMax - dynamicMin)) * H;
        const tyLo = burstLowAbsLevel == null
            ? -1
            : H - ((burstLowAbsLevel - dynamicMin) / (dynamicMax - dynamicMin)) * H;
        const dHi = Math.abs(my - tyHi);
        const dLo = tyLo < 0 ? Infinity : Math.abs(my - tyLo);
        if (dHi < 8 && dHi <= dLo) {
            draggingBurst = true;
            e.preventDefault();
        } else if (dLo < 8) {
            draggingBurstLow = true;
            e.preventDefault();
        }
    });

    psdCanvas.addEventListener("mouseup", function() {
        if (draggingBurst && noiseFloorDb != null) {
            draggingBurst = false;
            burstThresholdHighDb = Math.round((burstAbsLevel - noiseFloorDb) * 10) / 10;
            fetch("/config/apply", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({burst_threshold_high_db: String(burstThresholdHighDb)}),
            });
            psdCanvas.style.cursor = "";
        }
        if (draggingBurstLow && noiseFloorDb != null && burstThresholdHighDb > 0) {
            draggingBurstLow = false;
            const lowDb = Math.max(0.01, burstLowAbsLevel - noiseFloorDb);
            const ratio = Math.min(1.0, lowDb / burstThresholdHighDb);
            burstThresholdLowRatio = Math.round(ratio * 1000) / 1000;
            fetch("/config/apply", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({burst_threshold_low_ratio: String(burstThresholdLowRatio)}),
            });
            psdCanvas.style.cursor = "";
        }
    });

    psdCanvas.addEventListener("mousemove", function(e) {
        if (lastPowers.length === 0) return;
        const rect = psdCanvas.getBoundingClientRect();
        const scaleX = psdCanvas.width / rect.width;
        const scaleY = psdCanvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const my = (e.clientY - rect.top) * scaleY;
        const H = psdCanvas.height;

        if (draggingBurst) {
            burstAbsLevel = dynamicMax - (my / H) * (dynamicMax - dynamicMin);
            // Keep low line proportional during a high-line drag.
            if (noiseFloorDb != null) {
                burstLowAbsLevel = noiseFloorDb
                    + (burstAbsLevel - noiseFloorDb) * burstThresholdLowRatio;
            }
            psdCanvas.style.cursor = "ns-resize";
            redrawPSD();
            return;
        }
        if (draggingBurstLow) {
            const newLow = dynamicMax - (my / H) * (dynamicMax - dynamicMin);
            // Clamp: low must stay between noise floor and high threshold.
            if (noiseFloorDb != null && burstAbsLevel != null) {
                burstLowAbsLevel = Math.min(burstAbsLevel - 0.1,
                    Math.max(noiseFloorDb + 0.1, newLow));
            } else {
                burstLowAbsLevel = newLow;
            }
            psdCanvas.style.cursor = "ns-resize";
            redrawPSD();
            return;
        }

        let nearLine = false;
        if (burstAbsLevel != null) {
            const tyHi = H - ((burstAbsLevel - dynamicMin) / (dynamicMax - dynamicMin)) * H;
            if (Math.abs(my - tyHi) < 8) nearLine = true;
        }
        if (!nearLine && burstLowAbsLevel != null) {
            const tyLo = H - ((burstLowAbsLevel - dynamicMin) / (dynamicMax - dynamicMin)) * H;
            if (Math.abs(my - tyLo) < 8) nearLine = true;
        }
        psdCanvas.style.cursor = nearLine ? "ns-resize" : "";

        const N = lastPowers.length;
        psdCrosshairBin = Math.min(N - 1, Math.max(0, Math.floor((x / psdCanvas.width) * N)));

        const freq = lastFrequencies[psdCrosshairBin] || 0;
        const power = lastPowers[psdCrosshairBin] || 0;

        psdTooltip.style.display = "block";
        psdTooltip.textContent = (freq / 1e6).toFixed(2) + " MHz  " + power.toFixed(1) + " dB/bin";
        const tipX = e.clientX - rect.left;
        psdTooltip.style.left = Math.min(tipX + 10, rect.width - 160) + "px";
        psdTooltip.style.top = "4px";

        redrawPSD();
    });

    psdCanvas.addEventListener("mouseleave", function() {
        if (draggingBurst) draggingBurst = false;
        if (draggingBurstLow) draggingBurstLow = false;
        psdCanvas.style.cursor = "";
        psdCrosshairBin = -1;
        psdTooltip.style.display = "none";
        redrawPSD();
    });

    function _drawBurstLowLine() {
        if (burstLowAbsLevel == null) return;
        const W = psdCanvas.width;
        const H = psdCanvas.height;
        const ty = H - ((burstLowAbsLevel - dynamicMin) / (dynamicMax - dynamicMin)) * H;
        if (ty < 0 || ty > H) return;
        psdCtx.strokeStyle = "rgba(255, 159, 10, 0.6)";
        psdCtx.lineWidth = 1;
        psdCtx.setLineDash([3, 4]);
        psdCtx.beginPath();
        psdCtx.moveTo(0, ty);
        psdCtx.lineTo(W, ty);
        psdCtx.stroke();
        psdCtx.setLineDash([]);
        psdCtx.fillStyle = "rgba(255, 159, 10, 0.85)";
        psdCtx.font = "10px -apple-system, sans-serif";
        psdCtx.textAlign = "right";
        psdCtx.fillText(
            "Burst Lo " + burstLowAbsLevel.toFixed(1) + " dB/bin (×"
                + burstThresholdLowRatio.toFixed(2) + ")",
            W - 4, ty + 12,
        );
    }

    function redrawPSD() {
        drawPSD(psdCtx, psdCanvas.width, psdCanvas.height,
            lastPowers, lastFrequencies, dynamicMin, dynamicMax,
            psdCrosshairBin, burstAbsLevel);
        _drawBurstLowLine();
    }

    // --- Waterfall ---
    const wfCanvas = document.getElementById("waterfall-canvas");
    const wfCtx = wfCanvas.getContext("2d");
    const wfWidth = wfCanvas.width;
    const wfHeight = wfCanvas.height;

    let wfImageData = wfCtx.createImageData(wfWidth, wfHeight);
    let wfMessageCount = 0;

    // Burst overlay (must be declared before clearWaterfall)
    const burstOverlayCanvas = document.getElementById("burst-overlay");
    const burstCtx = burstOverlayCanvas.getContext("2d");
    const burstTooltip = document.getElementById("burst-tooltip");
    const wfWrapper = document.getElementById("wf-wrapper");

    // Per-spectrum-line timestamps: wfRowTimes[i] is the chunk_time_ms of
    // the line currently displayed at row i (0 = top = newest). The
    // backend stamps every broadcast; the frontend uses that + each
    // burst's start/stop_time_ms to place rectangles by absolute time.
    let wfRowTimes = [];
    // Bursts the backend has reported recently. Keyed by burst id (uuid)
    // so re-detection of the same physical burst in subsequent rolling
    // evaluations keeps refining its anchor instead of stacking.
    const seenBursts = new Map();
    // Last broadcast's frequency span — used to map burst freq to x.
    let lastFreqLowHz = null;
    let lastFreqHighHz = null;
    // Last frame's drawn rectangles, used by the hover tooltip.
    let lastDrawnRects = [];

    function clearWaterfall() {
        for (let i = 0; i < wfImageData.data.length; i += 4) {
            wfImageData.data[i] = 15; wfImageData.data[i+1] = 15;
            wfImageData.data[i+2] = 20; wfImageData.data[i+3] = 255;
        }
        wfCtx.putImageData(wfImageData, 0, 0);
        wfMessageCount = 0;
        wfRowTimes = [];
        seenBursts.clear();
        burstCtx.clearRect(0, 0, wfWidth, wfHeight);
        // Trigger level is synced from server on every PSD message, so no reset needed.
    }
    clearWaterfall();

    // Updates-per-second tracker
    let upsTimestamps = [];
    function recordUpdate() {
        const now = performance.now();
        upsTimestamps.push(now);
        const cutoff = now - 3000;
        while (upsTimestamps.length > 0 && upsTimestamps[0] < cutoff) {
            upsTimestamps.shift();
        }
        const elapsed = (now - upsTimestamps[0]) / 1000;
        const ups = upsTimestamps.length > 1 ? ((upsTimestamps.length - 1) / elapsed) : 0;
        const el = document.getElementById("ups-counter");
        if (el) el.textContent = ups.toFixed(1) + " ups";
    }

    function addWaterfallLine(powers, chunkTimeMs) {
        const rowBytes = wfWidth * 4;
        wfImageData.data.copyWithin(rowBytes, 0, (wfHeight - 1) * rowBytes);
        renderWaterfallRow(wfImageData, wfWidth, 0, powers, dynamicMin, dynamicMax);
        wfCtx.putImageData(wfImageData, 0, 0);
        // Record this row's timestamp at index 0 (top, newest).
        wfRowTimes.unshift(chunkTimeMs);
        if (wfRowTimes.length > wfHeight) wfRowTimes.length = wfHeight;
    }

    // Find the row index (0 = newest) whose stored time is closest to
    // *targetMs*. Returns -1 if targetMs is newer than the newest row,
    // wfHeight if older than the oldest. Linear scan — wfHeight is small.
    function rowForTime(targetMs) {
        if (wfRowTimes.length === 0) return -1;
        if (targetMs > wfRowTimes[0]) return -1;
        for (let i = 0; i < wfRowTimes.length; i++) {
            if (wfRowTimes[i] <= targetMs) return i;
        }
        return wfRowTimes.length;
    }

    function updateBurstOverlay(newBursts) {
        // Add / refresh each reported burst by id; the backend re-emits
        // pending bursts across detector evaluations, so the latest payload
        // for an id is the most accurate (the burst may have grown).
        if (newBursts && newBursts.length > 0) {
            for (const b of newBursts) {
                if (b.id != null) seenBursts.set(b.id, b);
            }
        }

        // Drop bursts whose stop time is older than the oldest visible row.
        if (wfRowTimes.length > 0) {
            const oldest = wfRowTimes[wfRowTimes.length - 1];
            for (const [id, b] of seenBursts) {
                if (b.stop_time_ms < oldest) seenBursts.delete(id);
            }
        }

        drawBurstOverlay();
    }

    function drawBurstOverlay() {
        burstCtx.clearRect(0, 0, wfWidth, wfHeight);
        lastDrawnRects = [];
        if (!showBursts) return;
        if (lastFreqLowHz == null || lastFreqHighHz == null) return;
        const fSpan = lastFreqHighHz - lastFreqLowHz;
        if (fSpan <= 0) return;

        for (const b of seenBursts.values()) {
            // Vertical: rows for stop (top of rect, more recent) and start.
            const yTopRow = rowForTime(b.stop_time_ms);
            const yBotRow = rowForTime(b.start_time_ms);
            const yTop = yTopRow < 0 ? 0 : yTopRow;
            const yBot = yBotRow >= wfHeight ? wfHeight : yBotRow;
            if (yBot <= 0 || yTop >= wfHeight) continue;
            const naturalH = yBot - yTop;
            const h = Math.max(3, naturalH);
            const yCenter = (yTop + yBot) / 2;
            const y = Math.max(0, Math.round(yCenter - h / 2));

            // Horizontal: map freq bounds onto canvas using the latest
            // broadcast's freq span.
            const xLoF = (b.freq_low_hz - lastFreqLowHz) / fSpan;
            const xHiF = (b.freq_high_hz - lastFreqLowHz) / fSpan;
            const naturalW = (xHiF - xLoF) * wfWidth;
            const w = Math.max(3, naturalW);
            const xCenter = ((xLoF + xHiF) / 2) * wfWidth;
            const x = Math.round(xCenter - w / 2);

            burstCtx.strokeStyle = "rgba(255, 60, 60, 0.9)";
            burstCtx.lineWidth = 1.5;
            burstCtx.strokeRect(x, y, w, h);
            burstCtx.fillStyle = "rgba(255, 60, 60, 0.08)";
            burstCtx.fillRect(x, y, w, h);
            lastDrawnRects.push({x, y, w, h, meta: b});
        }
    }

    // Hover tooltip for bursts
    wfWrapper.addEventListener("mousemove", function(e) {
        const rect = wfWrapper.getBoundingClientRect();
        const scaleX = wfWidth / rect.width;
        const scaleY = wfHeight / rect.height;
        const mx = (e.clientX - rect.left) * scaleX;
        const my = (e.clientY - rect.top) * scaleY;

        let hit = null;
        for (const b of lastDrawnRects) {
            if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
                hit = b;
                break;
            }
        }

        if (hit) {
            burstTooltip.style.display = "block";
            burstTooltip.innerHTML =
                (hit.meta.center_freq_hz / 1e6).toFixed(2) + " MHz"
                + " &middot; BW " + (hit.meta.bandwidth_hz / 1e6).toFixed(2) + " MHz"
                + " &middot; " + hit.meta.peak_power_db.toFixed(1) + " dBFS"
                + " &middot; " + hit.meta.duration_ms.toFixed(2) + " ms";
            const tipX = e.clientX - rect.left;
            const tipY = e.clientY - rect.top;
            burstTooltip.style.left = Math.min(tipX + 12, rect.width - 280) + "px";
            burstTooltip.style.top = Math.max(tipY - 24, 4) + "px";
        } else {
            burstTooltip.style.display = "none";
        }
    });

    wfWrapper.addEventListener("mouseleave", function() {
        burstTooltip.style.display = "none";
    });

    function updateDynamicRange(powers) {
        let pMin = Infinity, pMax = -Infinity;
        for (let i = 0; i < powers.length; i++) {
            if (powers[i] < pMin) pMin = powers[i];
            if (powers[i] > pMax) pMax = powers[i];
        }
        dynamicMin = dynamicMin * 0.95 + (pMin - 5) * 0.05;
        dynamicMax = dynamicMax * 0.95 + (pMax + 5) * 0.05;
    }

    // --- WebSocket ---
    function connectWS() {
        ws = new WebSocket(WS_URL);

        ws.onopen = function() {
            if (highRes) {
                ws.send(JSON.stringify({type: "set_mode", high_res: true}));
            }
        };

        ws.onmessage = function(evt) {
            const data = JSON.parse(evt.data);
            if (data.type === "psd") {
                recordUpdate();

                // Timing info
                const timingEl = document.getElementById("timing-info");
                if (timingEl) {
                    const procMs = data.process_ms || 0;
                    timingEl.textContent = procMs.toFixed(0) + " ms proc";
                    const sep = document.getElementById("timing-sep");
                    if (sep) sep.style.display = "";
                }

                // Time-series
                tsAvgPower.push(data.avg_power_db);
                tsKurtosis.push(data.kurtosis || 0);
                if (tsAvgPower.length > TS_MAX_POINTS) {
                    tsAvgPower.shift(); tsKurtosis.shift();
                }
                drawTimeSeries();

                // PSD + waterfall
                lastPowers = data.powers;
                lastFrequencies = data.frequencies;
                if (data.frequencies && data.frequencies.length >= 2) {
                    lastFreqLowHz = data.frequencies[0];
                    lastFreqHighHz = data.frequencies[data.frequencies.length - 1];
                }
                updateDynamicRange(data.powers);
                // Sync threshold-line state from server (skip the field
                // currently being dragged so the user isn't snapped back).
                if (!draggingTrigger && typeof data.trigger_threshold_db === "number") {
                    triggerThresholdDb = data.trigger_threshold_db;
                }
                if (!draggingBurst && typeof data.burst_threshold_high_db === "number") {
                    burstThresholdHighDb = data.burst_threshold_high_db;
                }
                if (!draggingBurstLow && typeof data.burst_threshold_low_ratio === "number") {
                    burstThresholdLowRatio = data.burst_threshold_low_ratio;
                }
                if (typeof data.noise_floor_db === "number") {
                    noiseFloorDb = data.noise_floor_db;
                }
                if (noiseFloorDb != null) {
                    if (!draggingBurst) {
                        burstAbsLevel = noiseFloorDb + burstThresholdHighDb;
                    }
                    if (!draggingBurstLow) {
                        burstLowAbsLevel = noiseFloorDb + burstThresholdHighDb * burstThresholdLowRatio;
                    }
                }
                redrawPSD();
                const chunkTimeMs = typeof data.chunk_time_ms === "number"
                    ? data.chunk_time_ms : Date.now();
                addWaterfallLine(data.powers, chunkTimeMs);
                updateBurstOverlay(data.bursts);
                drawLegendBar();
            }
        };

        ws.onclose = function() {
            ws = null;
            setTimeout(connectWS, 2000);
        };

        ws.onerror = function() { ws.close(); };
    }

    connectWS();

    // --- Recording controls ---
    const recBtn = document.getElementById("rec-btn");
    const armBtn = document.getElementById("arm-btn");
    const stopBtn = document.getElementById("stop-btn");
    const recStatus = document.getElementById("rec-status");

    function formatBytes(b) {
        if (b < 1024) return b + " B";
        if (b < 1048576) return (b / 1024).toFixed(1) + " KB";
        if (b < 1073741824) return (b / 1048576).toFixed(1) + " MB";
        return (b / 1073741824).toFixed(2) + " GB";
    }

    function updateRecUI(state, file, bytes, dur, dropped) {
        if (state === "recording") {
            recBtn.style.display = "none";
            armBtn.style.display = "none";
            stopBtn.style.display = "";
            let info = '<span class="pulse-red"></span> '
                + formatBytes(bytes) + " &middot; " + dur.toFixed(1) + "s";
            if (dropped > 0) info += ' <span style="color:#ff3b30;">(' + dropped + ' dropped)</span>';
            recStatus.innerHTML = info;
        } else if (state === "armed") {
            recBtn.style.display = "none";
            armBtn.style.display = "none";
            stopBtn.style.display = "";
            recStatus.innerHTML = '<span class="pulse-yellow"></span> Armed';
        } else {
            recBtn.style.display = "";
            armBtn.style.display = "";
            stopBtn.style.display = "none";
            recStatus.textContent = "";
        }
    }

    // Poll recording status
    setInterval(async function() {
        try {
            const r = await fetch("/api/recording/status");
            if (r.ok) {
                const d = await r.json();
                updateRecUI(d.state, d.file, d.bytes, d.duration_sec, d.dropped_chunks || 0);
            }
        } catch (_) { /* ignore */ }
    }, 1000);

    recBtn.addEventListener("click", async function() {
        await fetch("/api/recording/start", {method: "POST"});
    });
    armBtn.addEventListener("click", async function() {
        await fetch("/api/recording/arm", {method: "POST"});
    });
    stopBtn.addEventListener("click", async function() {
        await fetch("/api/recording/stop", {method: "POST"});
    });

    // --- Inline-editable status bar values ---
    let editing = false;

    document.body.addEventListener("htmx:beforeRequest", function(e) {
        if (editing && e.detail.elt && e.detail.elt.getAttribute("hx-get") === "/api/status-bar") {
            e.preventDefault();
        }
    });

    document.addEventListener("click", function(e) {
        const span = e.target.closest(".editable-val");
        if (!span || span.querySelector("input")) return;

        const field = span.dataset.field;
        const raw = span.dataset.raw;
        const suffix = span.dataset.suffix || "";

        editing = true;

        const input = document.createElement("input");
        input.type = "text";
        input.className = "inline-edit";
        input.value = raw;
        input.style.width = Math.max(80, span.offsetWidth + 20) + "px";

        const btn = document.createElement("button");
        btn.className = "inline-apply-btn";
        btn.textContent = "Apply";

        span.textContent = "";
        span.appendChild(input);
        span.appendChild(btn);
        input.focus();
        input.select();

        function cancel() {
            editing = false;
            span.textContent = formatVal(field, raw, suffix);
        }

        async function commit() {
            const rawInput = input.value.trim();
            if (!rawInput || rawInput === raw) { cancel(); return; }

            // Parse scientific notation (e.g. 2.437e9, 56e6)
            const parsed = parseFloat(rawInput);
            if (isNaN(parsed)) { cancel(); return; }
            const val = (field === "duration_sec") ? String(parsed) : String(Math.round(parsed));

            btn.textContent = "...";
            btn.disabled = true;

            const body = {};
            body[field] = val;
            if (field === "frequency_start") body["frequency_end"] = val;

            try {
                const resp = await fetch("/config/apply", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify(body),
                });
                if (resp.ok) {
                    editing = false;
                    span.dataset.raw = val;
                    span.textContent = formatVal(field, val, suffix);
                    span.classList.add("edit-success");
                    setTimeout(function() { span.classList.remove("edit-success"); }, 1000);
                    // Clear waterfall on freq/BW/duration change
                    clearWaterfall();
                } else {
                    cancel();
                }
            } catch (_) {
                cancel();
            }
        }

        btn.addEventListener("click", function(ev) {
            ev.stopPropagation();
            commit();
        });
        input.addEventListener("keydown", function(ev) {
            if (ev.key === "Enter") { ev.preventDefault(); commit(); }
            if (ev.key === "Escape") cancel();
        });
    });

    function formatVal(field, raw, suffix) {
        const v = parseFloat(raw);
        if (field === "frequency_start") return (v / 1e6).toFixed(1) + suffix;
        if (field === "bandwidth") return (v / 1e6).toFixed(0) + suffix;
        return v + suffix;
    }

    // --- Signal Modules ---
    const modulesContainer = document.getElementById("modules-container");
    const modulesEmpty = document.getElementById("modules-empty");
    const addModuleBtn = document.getElementById("add-module-btn");
    let audioContexts = {};
    let moduleTypes = {};  // cached from API

    addModuleBtn.addEventListener("click", function() {
        // Use first available type with its defaults
        const types = Object.keys(moduleTypes);
        const mtype = types.length > 0 ? types[0] : "fm_demod";
        fetch("/api/modules", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({type: mtype, params: {}}),
        }).then(r => r.json()).then(d => {
            if (d.module_id) refreshModules();
        }).catch(e => alert("Error: " + e.message));
    });

    function refreshModules() {
        // Skip refresh when an input is focused (prevents input destruction)
        if (modulesContainer.querySelector("input:focus, select:focus")) return;

        fetch("/api/modules").then(r => r.json()).then(d => {
            const mods = d.modules || [];
            moduleTypes = d.available_types || {};

            if (mods.length === 0) {
                modulesEmpty.style.display = "";
                modulesContainer.querySelectorAll(".module-card").forEach(e => e.remove());
                return;
            }
            modulesEmpty.style.display = "none";

            let html = "";
            for (const m of mods) {
                const mid = m.module_id;
                const mtype = m.module_type;
                const typeInfo = moduleTypes[mtype] || {};
                const params = typeInfo.parameters || [];
                const playing = !!audioContexts[mid];

                html += '<div class="module-card" data-id="' + mid + '">';
                html += '<span class="module-type">' + mtype.replace("_", " ").toUpperCase() + '</span> ';

                // Render each parameter generically
                for (const p of params) {
                    const val = m[p.name] !== undefined ? m[p.name] : p.default;
                    if (p.type === "number") {
                        let displayVal = val;
                        let displayUnit = p.unit;
                        if (p.unit === "Hz" && val >= 1e6) {
                            displayVal = (val / 1e6).toFixed(1);
                            displayUnit = "MHz";
                        }
                        html += '<input type="text" class="module-freq-input" value="' + displayVal
                            + '" data-mid="' + mid + '" data-param="' + p.name
                            + '" data-unit="' + p.unit + '" title="' + p.label + '">';
                        html += '<span class="qc-unit">' + displayUnit + '</span> ';
                    } else if (p.type === "range") {
                        html += '<input type="range" class="module-range" value="' + val
                            + '" min="' + (p.min||0) + '" max="' + (p.max||1) + '" step="' + (p.step||0.01)
                            + '" data-mid="' + mid + '" data-param="' + p.name
                            + '" title="' + p.label + '" style="width:60px;vertical-align:middle;"> ';
                    } else if (p.type === "select") {
                        html += '<select class="module-select" data-mid="' + mid + '" data-param="' + p.name
                            + '" title="' + p.label + '" style="font-size:11px;">';
                        for (const opt of (p.options || [])) {
                            const sel = String(val) === opt ? " selected" : "";
                            html += '<option value="' + opt + '"' + sel + '>' + opt + '</option>';
                        }
                        html += '</select> ';
                    }
                }

                // Audio play button (only if module has audio output)
                if (m.has_audio) {
                    html += '<button class="rec-btn rec-start" onclick="toggleAudio(\'' + mid + '\')">'
                        + (playing ? '■ Stop' : '▶ Play') + '</button> ';
                }
                html += '<button class="rec-btn rec-stop" onclick="removeModule(\'' + mid + '\')">✕</button>';
                html += '</div>';
            }
            modulesContainer.innerHTML = html;

            // Attach generic param change handlers
            modulesContainer.querySelectorAll(".module-freq-input").forEach(function(inp) {
                function commit() {
                    let v = parseFloat(inp.value);
                    if (isNaN(v)) return;
                    if (inp.dataset.unit === "Hz" && v < 1e6) v = v * 1e6;
                    const body = {};
                    body[inp.dataset.param] = v;
                    fetch("/api/modules/" + inp.dataset.mid, {
                        method: "PATCH",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify(body),
                    });
                }
                inp.addEventListener("keydown", function(e) {
                    if (e.key === "Enter") { e.preventDefault(); commit(); inp.blur(); }
                });
                inp.addEventListener("blur", commit);
            });

            modulesContainer.querySelectorAll(".module-range").forEach(function(inp) {
                inp.addEventListener("input", function() {
                    const body = {};
                    body[inp.dataset.param] = parseFloat(inp.value);
                    fetch("/api/modules/" + inp.dataset.mid, {
                        method: "PATCH",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify(body),
                    });
                });
            });

            modulesContainer.querySelectorAll(".module-select").forEach(function(sel) {
                sel.addEventListener("change", function() {
                    const body = {};
                    body[sel.dataset.param] = sel.value;
                    fetch("/api/modules/" + sel.dataset.mid, {
                        method: "PATCH",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify(body),
                    });
                });
            });
        }).catch(() => {});
    }

    // Expose to onclick handlers
    window.toggleAudio = function(moduleId) {
        if (audioContexts[moduleId]) {
            const a = audioContexts[moduleId];
            if (a.ws) a.ws.close();
            if (a.ctx) a.ctx.close();
            delete audioContexts[moduleId];
            refreshModules();
            return;
        }

        const wsUrl = "ws://" + location.host + "/api/ws/audio/" + moduleId;
        const aws = new WebSocket(wsUrl);
        let audioCtx = null;
        let scriptNode = null;
        let pcmBuffer = new Float32Array(0);
        let started = false;
        let preBufferSamples = 0;

        aws.binaryType = "arraybuffer";
        aws.onmessage = async function(evt) {
            if (typeof evt.data === "string") {
                const cfg = JSON.parse(evt.data);
                audioCtx = new AudioContext({sampleRate: cfg.sample_rate});
                preBufferSamples = cfg.sample_rate * 0.3;  // 300ms pre-buffer

                const bufSize = 8192;
                scriptNode = audioCtx.createScriptProcessor(bufSize, 0, 1);
                scriptNode.onaudioprocess = function(e) {
                    const out = e.outputBuffer.getChannelData(0);
                    if (pcmBuffer.length >= out.length) {
                        out.set(pcmBuffer.subarray(0, out.length));
                        pcmBuffer = pcmBuffer.slice(out.length);
                    } else {
                        out.fill(0);
                    }
                };
                // Don't connect yet — wait for pre-buffer
                audioContexts[moduleId] = {ctx: audioCtx, ws: aws, node: scriptNode};
                refreshModules();
            } else {
                const int16 = new Int16Array(evt.data);
                const f32 = new Float32Array(int16.length);
                for (let i = 0; i < int16.length; i++) f32[i] = int16[i] / 32768.0;
                const newBuf = new Float32Array(pcmBuffer.length + f32.length);
                newBuf.set(pcmBuffer);
                newBuf.set(f32, pcmBuffer.length);
                pcmBuffer = newBuf;

                // Start playback after pre-buffer fills
                if (!started && pcmBuffer.length >= preBufferSamples && scriptNode && audioCtx) {
                    scriptNode.connect(audioCtx.destination);
                    started = true;
                }

                // Cap at 4 seconds
                const maxSamples = (audioCtx ? audioCtx.sampleRate : 48000) * 4;
                if (pcmBuffer.length > maxSamples) {
                    pcmBuffer = pcmBuffer.slice(pcmBuffer.length - maxSamples);
                }
            }
        };

        aws.onerror = function() { aws.close(); };
        aws.onclose = function() {
            if (audioContexts[moduleId]) {
                delete audioContexts[moduleId];
                refreshModules();
            }
        };
    };

    window.removeModule = function(moduleId) {
        if (audioContexts[moduleId]) {
            window.toggleAudio(moduleId);  // stop audio first
        }
        fetch("/api/modules/" + moduleId, {method: "DELETE"}).then(() => refreshModules());
    };

    // Poll module status
    setInterval(refreshModules, 3000);
    refreshModules();
})();
</script>
{% endblock %}
